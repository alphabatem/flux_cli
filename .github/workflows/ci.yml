name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build -o flux .

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Verify help output
        run: |
          ./flux version
          ./flux --help
          ./flux rpc --help
          ./flux data --help
          ./flux rugcheck --help
          ./flux config path
