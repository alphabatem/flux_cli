name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME=flux
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME=flux.exe
          fi
          go build -o "${BINARY_NAME}" .

      - name: Vet
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go vet ./...

      - name: Test
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go test ./...

      - name: Verify help output
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          ./flux version
          ./flux --help
          ./flux rpc --help
          ./flux data --help
          ./flux rugcheck --help
          ./flux config path

  tag:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        run: |
          # Get the latest tag, default to v0.0.0 if none exists
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          # Bump patch version
          MAJOR=$(echo "$LATEST" | cut -d. -f1)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          NEW_TAG="${MAJOR}.${MINOR}.$((PATCH + 1))"

          echo "Tagging ${NEW_TAG}"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

  release-build:
    needs: tag
    runs-on: ubuntu-latest
    if: needs.tag.outputs.new_tag != ''
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ needs.tag.outputs.new_tag }}
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BINARY_NAME=flux
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME=flux.exe
          fi

          go build -ldflags "\
            -X github.com/alphabatem/flux_cli/cmd.Version=${VERSION} \
            -X github.com/alphabatem/flux_cli/cmd.Commit=${COMMIT} \
            -X github.com/alphabatem/flux_cli/cmd.BuildDate=${BUILD_DATE}" \
            -o ${BINARY_NAME} .

          # Package
          ARCHIVE_NAME="flux_${VERSION#v}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            zip "${ARCHIVE_NAME}.zip" ${BINARY_NAME}
          else
            tar czf "${ARCHIVE_NAME}.tar.gz" ${BINARY_NAME}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: flux-${{ matrix.goos }}-${{ matrix.goarch }}
          path: flux_*

  release:
    needs: [tag, release-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          generate_release_notes: true
          files: artifacts/*

  checksums:
    needs: [tag, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum flux_* > checksums.txt
          cat checksums.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          files: artifacts/checksums.txt
