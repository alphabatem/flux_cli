name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BINARY_NAME=flux
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME=flux.exe
          fi

          go build -ldflags "\
            -X github.com/alphabatem/flux_cli/cmd.Version=${VERSION} \
            -X github.com/alphabatem/flux_cli/cmd.Commit=${COMMIT} \
            -X github.com/alphabatem/flux_cli/cmd.BuildDate=${BUILD_DATE}" \
            -o ${BINARY_NAME} .

          # Package
          ARCHIVE_NAME="flux_${VERSION#v}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            zip "${ARCHIVE_NAME}.zip" ${BINARY_NAME}
          else
            tar czf "${ARCHIVE_NAME}.tar.gz" ${BINARY_NAME}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flux-${{ matrix.goos }}-${{ matrix.goarch }}
          path: flux_*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  checksums:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum flux_* > checksums.txt
          cat checksums.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/checksums.txt
